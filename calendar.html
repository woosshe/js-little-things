<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar</title>
  </head>
  <style type="text/css">
    ul {
      padding: 0;
      margin: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    li {
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      justify-self: center;
    }
    li:nth-of-type(7n) {
      color: royalblue;
    }
    li:nth-of-type(7n + 1) {
      color: tomato;
    }
    li.today {
      background-color: black;
      color: #fff;
      font-weight: bold;
      border-radius: 50%;
    }
    li.lastMonth,
    li.nextMonth {
      opacity: 0.3 !important;
    }
    .header,
    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }
  </style>
  <body>
    <div class="header">
      <button type="button" onclick="lastYear();">&lt;&lt;</button>
      <button type="button" onclick="lastMonth();">&lt;</button>
      <div id="month"></div>
      <button type="button" onclick="nextMonth();">&gt;</button>
      <button type="button" onclick="nextYear();">&gt;&gt;</button>
    </div>

    <ul id="calendar"></ul>

    <div class="footer">
      <button type="button" onclick="setToday();">today</button>
    </div>

    <script type="text/javascript">
      const days = ["S", "M", "T", "W", "T", "F", "S"];
      let calendar = new Date();

      const minYear = 1900;
      const maxYear = 2190;

      const format = (date, ym) => {
        if (date && date.getTime) {
          let str = `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, "0")}`;
          if (!ym) {
            str += `.${String(date.getDate()).padStart(2, "0")}`;
          }
          return str;
        }
        return;
      };

      const classDay = (date) => {};

      const drawCalendar = () => {
        const month = document.querySelector("#month");
        month.innerHTML = `${format(calendar, true)}`;

        const firstDate = new Date(calendar.getFullYear(), calendar.getMonth(), 1);
        const lastDate = new Date(calendar.getFullYear(), calendar.getMonth() + 1, 0);

        const ul = document.querySelector("#calendar");
        ul.innerHTML = "";

        for (let i = 0; i < days.length; i++) {
          ul.innerHTML += `<li>${days[i]}</li>`;
        }

        if (firstDate.getDay() > 0) {
          for (let i = 1; i <= firstDate.getDay(); i++) {
            const date = new Date(new Date(firstDate).setDate(1 - (7 - i)));
            ul.innerHTML += `<li class="lastMonth">${date.getDate()}</li>`;
          }
        }

        for (let i = firstDate.getDate(); i <= lastDate.getDate(); i++) {
          const date = new Date(new Date(calendar).setDate(i));
          ul.innerHTML += `<li class="${format(date) === format(new Date()) ? "today" : ""}">${i}</li>`;
        }

        for (let i = 1; i < 7 - lastDate.getDay(); i++) {
          ul.innerHTML += `<li class="nextMonth">${i}</li>`;
        }
      };

      const lastMonth = () => {
        if (calendar.getFullYear() > minYear || calendar.getMonth() > 0) {
          calendar.setDate(0);
          drawCalendar();
        }
      };

      const nextMonth = () => {
        if (calendar.getFullYear() < maxYear || calendar.getMonth() < 11) {
          calendar.setDate(32);
          drawCalendar();
        }
      };

      const lastYear = () => {
        if (calendar.getFullYear() > minYear) {
          calendar.setYear(calendar.getFullYear() - 1);
          drawCalendar();
        }
      };

      const nextYear = () => {
        if (calendar.getFullYear() < maxYear) {
          calendar.setYear(calendar.getFullYear() + 1);
          drawCalendar();
        }
      };

      const setToday = () => {
        calendar = new Date();
        drawCalendar();
      };

      setToday();
    </script>
  </body>
</html>
