<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cube</title>
    <style type="text/css">
      #wrap {
        position: fixed;
        left: 50%;
        /* top: calc(50% - 75px); */
        top: 50%;
        width: 200px;
        height: 200px;
        perspective: 400px;
        transform: translateX(-50%) translateY(-50%);
      }
      #drag-area {
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        /* bottom: 200px; */
        bottom: 0;
        z-index: 2;
      }
      #cube {
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
      }
      .face {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        -webkit-user-select: none; /* Safari */
        -ms-user-select: none; /* IE 10 and IE 11 */
        user-select: none; /* Standard syntax */
      }
      .face.front {
        background: rgba(255, 192, 203, 0.8);
        transform: rotateY(0deg) translateZ(100px);
      }
      .face.back {
        background: rgba(137, 255, 68, 0.8);
        transform: rotateY(180deg) translateZ(100px);
      }
      .face.left {
        background: rgba(255, 255, 0, 0.8);
        transform: rotateY(-90deg) translateZ(100px);
      }
      .face.right {
        background: rgba(0, 255, 255, 0.8);
        transform: rotateY(90deg) translateZ(100px);
      }
      .face.top {
        background: rgba(192, 192, 192, 0.8);
        transform: rotateX(90deg) translateZ(100px);
      }
      .face.bottom {
        background: rgba(255, 127, 80, 0.8);
        transform: rotateX(-90deg) translateZ(100px);
      }
      #sliders {
        position: fixed;
        z-index: 1;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        display: none;
      }
      #sliders label {
        display: inline-block;
        width: 100px;
      }
      #sliders input[type="range"] ~ span {
        display: inline-block;
        width: 50px;
        padding-left: 10px;
      }
    </style>
  </head>
  <body>
    <div id="drag-area"></div>
    <div id="wrap">
      <div id="cube">
        <div class="face front">Front</div>
        <div class="face back">Back</div>
        <div class="face left">Left</div>
        <div class="face right">Right</div>
        <div class="face top">Top</div>
        <div class="face bottom">Bottom</div>
      </div>
    </div>
    <div id="sliders">
      <div><label for="scale">Scale</label><input id="scale" type="range" min="1" max="30" value="10" /><span>1</span></div>
      <div>
        <label for="rotateX">Rotate X</label><input id="rotateX" type="range" min="-360" max="360" value="0" data-suffix="deg" /><span>0</span>
      </div>
      <div>
        <label for="rotateY">Rotate Y</label><input id="rotateY" type="range" min="-360" max="360" value="0" data-suffix="deg" /><span>0</span>
      </div>
      <div>
        <label for="rotateZ">Rotate Z</label><input id="rotateZ" type="range" min="-360" max="360" value="0" data-suffix="deg" /><span>0</span>
      </div>
    </div>
    <script type="text/javascript">
      const cube = document.querySelector("#cube");
      const sliders = document.querySelectorAll("#sliders input[type=range]");
      sliders.forEach((slider, i) => {
        slider.addEventListener("input", (e) => {
          setValues();
        });
      });
      const setValues = () => {
        let transform = "";
        sliders.forEach((slider, i) => {
          let value = slider.value;
          if (slider.value) {
            value = slider.value / (slider.id === "scale" ? 10 : 1);
            transform += ` ${slider.id}(${value}${slider.dataset.suffix || ""})`;
          }
          slider.nextElementSibling.innerText = `${value}`;
        });
        cube.style.transform = transform;
      };

      const dragArea = document.querySelector("#drag-area");
      let clickX = 0;
      let clickY = 0;

      let moveX = 0;
      let moveY = 0;

      let lastX = -25;
      let lastY = 25;

      dragArea.addEventListener("mousedown", (e) => {
        let isClick = true;

        clickX = e.screenX;
        clickY = e.screenY;

        window.addEventListener("mousemove", (e) => {
          if (isClick) {
            const nowX = e.screenX;
            const nowY = e.screenY;

            moveX = lastX + clickY - nowY;
            moveY = lastY - clickX + nowX;
            console.log(moveX, moveY);

            cube.style.transform = `
              scale(${document.querySelector("#scale").value / 10})
              rotateX(${moveX / 3}deg)
              rotateY(${moveY / 3}deg)
            `;
          }
        });

        window.addEventListener(
          "mouseup",
          (e) => {
            if (isClick) {
              lastX = moveX;
              lastY = moveY;
              isClick = false;
            }
          },
          { once: true }
        );
      });

      // const animate = () => {
      //   cube
      //     .animate([{ transform: `rotateX(0deg) rotateY(0deg)` }, { transform: `rotateX(-360deg) rotateY(-180deg)` }], {
      //       duration: 2500,
      //     })
      //     .finished.then((e) => {
      //       cube
      //         .animate([{ transform: `rotateX(-360deg) rotateY(-180deg)` }, { transform: `rotateX(-720deg) rotateY(-360deg)` }], {
      //           duration: 2500,
      //         })
      //         .finished.then(animate);
      //     });
      // };
      // animate();
    </script>
  </body>
</html>
