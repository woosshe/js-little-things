<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <style type="text/css">
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #wrap {
        position: fixed;
        z-index: 1;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      .board {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        /* background-color: #eee; */
        transform-origin: 50% 50%;
        overflow: hidden;
      }
      .board .index {
        position: absolute;
        z-index: 2;
        left: 50%;
        width: 4px;
        border-radius: 2px;
      }
      .board .number {
        position: absolute;
        z-index: 3;
        left: 50%;
      }
      .board .number span {
        display: block;
        font-family: "Arial Rounded MT";
        font-size: 200%;
        letter-spacing: -0.15em;
      }
      .board .niddle {
        position: absolute;
        z-index: 4;
        left: 50%;
        width: 2px;
        transform-origin: 50% 100%;
        /* transition: all 1s linear; */
        transform: translateX(-50%);
        width: 10px;
        border-radius: 5px;
        background-color: black;
      }
      .board .niddle.seconds {
        z-index: 6;
        width: 2px;
        border-radius: 1px;
        background-color: tomato;
      }
      .board .center1 {
        position: absolute;
        z-index: 5;
        width: 22px;
        height: 22px;
        left: 50%;
        top: 50%;
        box-sizing: border-box;
        background: #fff;
        border-radius: 50%;
        border: solid 6px #000;
        transform: translate(-50%, -50%);
      }
      .board .center2 {
        position: absolute;
        z-index: 6;
        width: 12px;
        height: 12px;
        left: 50%;
        top: 50%;
        box-sizing: border-box;
        background: #fff;
        border-radius: 50%;
        border: solid 3px tomato;
        transform: translate(-50%, -50%);
      }
      .board .date {
        position: absolute;
        left: 50%;
        top: 30%;
        font-family: "Segoe UI", "MalgunGothic";
        font-size: 100%;
        font-weight: 100;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div id="wrap"><div class="board"></div></div>
    <script type="text/javascript">
      const size = 400;

      const wrap = document.querySelector("#wrap");
      const board = wrap.querySelector(".board");

      wrap.style.width = `${size}px`;
      wrap.style.height = `${size}px`;

      for (let i = 1; i <= 12; i++) {
        const index = document.createElement("div");
        index.classList.add(`index`, `hour`, `h${String(i).padStart(2, "0")}`);
        index.style.transformOrigin = `50% ${size / 2}px`;
        index.style.transform = `translateX(-50%) rotate(${i * (360 / 12)}deg)`;
        index.style.height = `${size / 30}px`;
        index.style.backgroundColor = `rgba(0, 0, 0, 1)`;
        board.append(index);

        const number = document.createElement("div");
        number.classList.add(`number`);
        number.style.transformOrigin = `50% ${size / 2}px`;
        number.style.transform = `translateX(-50%) rotate(${i * (360 / 12)}deg)`;
        number.style.paddingTop = `calc(${size / 25}px)`;

        const span = document.createElement("span");
        span.style.transform = `rotate(-${i * (360 / 12)}deg)`;
        span.innerText = i;

        number.append(span);
        board.append(number);
      }

      for (let i = 1; i <= 60; i++) {
        if (i % 5 > 0) {
          const index = document.createElement("div");
          index.classList.add(`index`, `minutes`, `m${String(i).padStart(2, "0")}`);
          index.style.transformOrigin = `50% ${size / 2}px`;
          index.style.transform = `translateX(-50%) rotate(${i * (360 / 60)}deg)`;
          index.style.height = `${size / 40}px`;
          index.style.backgroundColor = `rgba(0, 0, 0, 0.2)`;
          board.append(index);
        }
      }

      const niddle = document.createElement("div");
      niddle.classList.add("niddle");

      const niddle_h = niddle.cloneNode();
      niddle_h.classList.add("hour");
      niddle_h.style.marginTop = `${size / 3.5}px`;
      niddle_h.style.height = `calc(${size / 2}px - ${size / 3.5}px)`;
      board.append(niddle_h);

      const niddle_m = niddle.cloneNode();
      niddle_m.classList.add("minutes");
      niddle_m.style.marginTop = `${size / 6}px`;
      niddle_m.style.height = `calc(${size / 2}px - ${size / 6}px)`;
      board.append(niddle_m);

      const niddle_s = niddle.cloneNode();
      niddle_s.classList.add("seconds");
      niddle_s.style.height = `${size / 2}px`;
      board.append(niddle_s);

      const center = document.createElement("div");

      const c1 = center.cloneNode();
      c1.classList.add("center1");
      board.append(c1);

      const c2 = center.cloneNode();
      c2.classList.add("center2");
      board.append(c2);

      const date = document.createElement("div");
      date.classList.add("date");
      board.append(date);

      const setDate = () => {
        const now = new Date();
        date.innerText = `${now.getMonth() + 1} / ${now.getDate()} (${["일", "월", "화", "수", "목", "금", "토"][now.getDay()]})`;
      };
      setInterval(setDate, 1000);

      const setTime = () => {
        const transform = `translateX(-50%)`;
        const now = new Date();
        niddle_h.style.transform = `${transform} rotate(${(now.getHours() * 60 + now.getMinutes()) / 2}deg)`;
        niddle_m.style.transform = `${transform} rotate(${(now.getMinutes() * 60 + now.getSeconds()) / 10}deg)`;
        niddle_s.style.transform = `${transform} rotate(${(now.getSeconds() + now.getMilliseconds() / 1000) * 6}deg)`;
      };
      setTime();

      setInterval(setTime, 1000 / 30);
    </script>
  </body>
</html>
