<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>snow</title>
    <style type="text/css">
      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(#000, #111);
        overflow: hidden;
      }
      @keyframes falling {
        from {
          top: 0;
        }
        to {
          top: 100%;
        }
      }
      .snow {
        position: absolute;
        /* animation: 2s linear falling; */
      }
      .snow {
        background: #fff;
        border-radius: 50%;
        transition: all 0.1s;
      }
      #count {
        color: #fff;
        text-align: right;
        padding: 10px;
        font-size: 70%;
      }
      #background {
        position: fixed;
        top: 100vh;
        left: 0;
        right: 0;
      }
      .mount1 {
        position: absolute;
        background: linear-gradient(rgba(0, 0, 0, 0), #333);
        width: 500px;
        height: 500px;
        border-radius: 50px;
        transform: rotate(45deg);
        top: -200px;
        left: -150px;
      }
      .mount2 {
        position: absolute;
        background: #151515;
        width: 400px;
        height: 400px;
        border-radius: 50px;
        transform: rotate(45deg);
        top: -120px;
        left: 200px;
      }
    </style>
  </head>
  <body>
    <div id="background">
      <div class="mount1"></div>
      <div class="mount2"></div>
    </div>
    <div id="count"></div>
    <script type="text/javascript">
      const limit = 50;
      const speed = 1.5;
      const falling = (obj) => {
        const rate = Math.random();
        let top = -20;
        let left = Math.random() * window.innerWidth;
        let size = rate * 8 + 4;
        const interval = setInterval(() => {
          top = top + speed * rate;
          if (Math.round(Math.random())) {
            left = left + (speed / 2) * rate;
          } else {
            left = left - (speed / 2) * rate;
          }
          obj.style.top = top + "px";
          obj.style.left = left + "px";
          obj.style.width = size + "px";
          obj.style.height = size + "px";
          obj.style.opacity = rate;
          if (top >= window.innerHeight - size / 2.5) {
            obj.style.width = size * 1.5 + "px";
            clearInterval(interval);
            melting(obj);
          }
        }, 1);
      };
      console.log(1);
      const melting = (obj) => {
        duration = 500;
        const interval = setInterval(() => {
          if (obj.style.opacity <= 0) obj.remove();
          obj.style.opacity = obj.style.opacity - 1 / duration;
        }, 1);
      };
      const makeSnow = () => {
        if (document.querySelectorAll(".snow")?.length < limit) {
          const snow = document.createElement("div");
          snow.classList.add("snow");
          document.body.appendChild(snow);
          falling(snow);
        }
      };
      setInterval(makeSnow, 100);
      setInterval(() => {
        const snows = document.querySelectorAll(".snow");
        document.querySelector("#count").innerHTML = snows.length;
      }, 100);
    </script>
  </body>
</html>
