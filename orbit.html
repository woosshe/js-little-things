<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit</title>
    <style type="text/css">
      html {
        overflow: hidden;
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(#222, #000);

        --mars-o: 200px;
        --mars-p: 10px;
        --mars-s: 10s;
        --mars-r: 1s;
      }

      #solar > div {
        position: fixed;
        left: 50%;
        top: 50%;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }

      #sun {
        /* width: 100px;
        height: 100px; */
        background: radial-gradient(orange, yellow);
      }

      /* #mars {
        width: var(--mars-o);
        height: var(--mars-o);
        transform: rotate(0deg);
      } */

      .orbit {
        position: absolute;
        left: 50%;
        top: 50%;
        /* width: calc(var(--mars-o) - var(--mars-p));
        height: calc(var(--mars-o) - var(--mars-p)); */
        border: solid 1px #fff2;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }

      .planet {
        position: absolute;
        /* width: var(--mars-p);
        height: var(--mars-p); */
        border-radius: 50%;
        background: linear-gradient(#fff, #f00);
        left: 50%;
        top: 0;
        box-shadow: 0 0 15px #0006;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>

  <body>
    <div id="solar"></div>
    <script type="text/javascript">
      const s = {
        sun: { size: 50 },
        mercury: { size: 5, length: 300 * 0.4, orbit: 87, rotate: 58 },
        venus: { size: 14, length: 300 * 0.7, orbit: 224, rotate: 243, reverse: true },
        earth: { size: 15, length: 300, orbit: 365, rotate: 1 },
        mars: { size: 10, length: 300 * 1.5, orbit: 686, rotate: 1 },
        jupiter: { size: 50, length: 300 * 4, orbit: 4333, rotate: 0.4 },
        saturn: { size: 40, length: 300 * 5, orbit: 10756, rotate: 0.4 },
        uranus: { size: 30, length: 300 * 6, orbit: 30707, rotate: 0.7 },
        neptune: { size: 30, length: 300 * 7, orbit: 60223, rotate: 0.6 },
        pluto: { size: 5, length: 300 * 10, orbit: 990623, rotate: 6, reverse: true },
      };

      console.log(Object.keys(s));

      const solar = document.querySelector("#solar");

      Object.keys(s).map((id, i) => {
        const { size, length, orbit, rotate, reverse } = s[id];

        const div = document.createElement("div");
        div.setAttribute("id", id);

        if (length) {
          div.style.width = `${length}px`;
          div.style.height = `${length}px`;
        }

        if (length && orbit) {
          const o = document.createElement("div");
          o.classList.add("orbit");
          o.style.width = `${length}px`;
          o.style.height = `${length}px`;
          div.appendChild(o);

          div.animate(
            [
              { transform: `translate(-50%, -50%) rotate(0deg)` },
              { transform: `translate(-50%, -50%) rotate(360deg)` },
            ],
            {
              duration: orbit * 10,
              iterations: Infinity,
            }
          );
        }

        if (length && size) {
          const p = document.createElement("div");
          p.classList.add("planet");
          p.style.width = `${size}px`;
          p.style.height = `${size}px`;

          p.animate(
            [
              { transform: `translate(-50%, -50%) rotate(${reverse ? 360 : 0}deg)` },
              { transform: `translate(-50%, -50%) rotate(${reverse ? 0 : 360}deg)` },
            ],
            {
              duration: rotate * 1000,
              iterations: Infinity,
            }
          );
          div.appendChild(p);
        } else if (size) {
          div.style.width = `${size}px`;
          div.style.height = `${size}px`;
        }

        solar.appendChild(div);
      });
    </script>
  </body>
</html>
